name: CI / Build

on:
  push:
    branches: [main, develop]
    paths-ignore: ['**.md', '.gitignore']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        if: github.event_name == 'pull_request'
        id: test
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run --rm $IMAGE_TAG --version > /tmp/version.txt 2>&1 || true
          if [ -s /tmp/version.txt ]; then
            echo "✅ Test Passed"
            cat /tmp/version.txt
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Test Failed"
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: PR Feedback (Submodule Update)
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'submodule-update')
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.test.outputs.success }}' === 'true';
            const body = `## ${success ? '✅' : '❌'} Submodule Build Report
            **Status:** ${success ? 'Success' : 'Failed'}
            **Image Tags:** \`${{ steps.meta.outputs.tags }}\`
            [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
