name: Ollama Version Sync

on:
  # Run daily at 3 AM (UTC) - Noon in Korea Time
  schedule:
    - cron: '0 3 * * *'
  
  # Manual execution enabled
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific Ollama version to sync (e.g., v0.6.1). Leave blank to use latest release.'
        required: false
        default: ''
        type: string
      force_update:
        description: 'Force update even if version has not changed'
        required: false
        default: false
        type: boolean

env:
  SUBMODULE_PATH: ollama
  SUBMODULE_NAME: ollama
  OLLAMA_REPO: ollama/ollama

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      new_version: ${{ steps.check.outputs.new_version }}
      new_commit: ${{ steps.check.outputs.new_commit }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Get current submodule version
        id: current
        run: |
          cd ${{ env.SUBMODULE_PATH }}

          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "Current submodule commit: $CURRENT_COMMIT"

          # Find the tag pointing to (or nearest to) the current commit
          CURRENT_VERSION=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [ -z "$CURRENT_VERSION" ]; then
            CURRENT_VERSION=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "unknown")
          fi
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current submodule version: $CURRENT_VERSION"
      
      - name: Fetch latest Ollama release version
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine target version
          INPUT_VERSION="${{ inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            # Use manually-specified version
            TARGET_VERSION="$INPUT_VERSION"
            echo "Using manually specified version: $TARGET_VERSION"
          else
            # Fetch the latest stable release from GitHub API
            TARGET_VERSION=$(gh release view --repo ${{ env.OLLAMA_REPO }} --json tagName -q '.tagName' 2>/dev/null || echo "")
            if [ -z "$TARGET_VERSION" ]; then
              echo "❌ Failed to fetch latest release version from GitHub API"
              exit 1
            fi
            echo "Latest upstream release: $TARGET_VERSION"
          fi

          echo "version=$TARGET_VERSION" >> $GITHUB_OUTPUT

          # Resolve the commit SHA for this tag in the submodule
          cd ${{ env.SUBMODULE_PATH }}
          git fetch --tags origin
          TARGET_COMMIT=$(git rev-list -n 1 "refs/tags/$TARGET_VERSION" 2>/dev/null || echo "")
          if [ -z "$TARGET_COMMIT" ]; then
            echo "❌ Could not resolve commit for tag: $TARGET_VERSION"
            exit 1
          fi
          echo "commit=$TARGET_COMMIT" >> $GITHUB_OUTPUT
          echo "Target commit for $TARGET_VERSION: $TARGET_COMMIT"
      
      - name: Check for version change
        id: check
        run: |
          CURRENT_VERSION="${{ steps.current.outputs.version }}"
          TARGET_VERSION="${{ steps.fetch.outputs.version }}"
          CURRENT_COMMIT="${{ steps.current.outputs.commit }}"
          TARGET_COMMIT="${{ steps.fetch.outputs.commit }}"
          FORCE="${{ inputs.force_update }}"

          echo "Current version : $CURRENT_VERSION  ($CURRENT_COMMIT)"
          echo "Target version  : $TARGET_VERSION  ($TARGET_COMMIT)"

          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ] || [ "$FORCE" == "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "new_version=$TARGET_VERSION" >> $GITHUB_OUTPUT
            echo "new_commit=$TARGET_COMMIT" >> $GITHUB_OUTPUT
            echo "✅ Version change detected (or force update enabled)"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Already at the latest release version ($CURRENT_VERSION). No update needed."
          fi
      
      - name: Checkout target release tag in submodule
        if: steps.check.outputs.has_changes == 'true'
        run: |
          cd ${{ env.SUBMODULE_PATH }}
          TARGET_VERSION="${{ steps.check.outputs.new_version }}"
          git checkout "refs/tags/$TARGET_VERSION"
          
          cd ..
          git add ${{ env.SUBMODULE_PATH }}
      
      - name: Get submodule changelog
        if: steps.check.outputs.has_changes == 'true'
        id: changelog
        run: |
          cd ${{ env.SUBMODULE_PATH }}
          
          CURRENT_COMMIT="${{ steps.current.outputs.commit }}"
          TARGET_COMMIT="${{ steps.check.outputs.new_commit }}"
          CURRENT_VERSION="${{ steps.current.outputs.version }}"
          TARGET_VERSION="${{ steps.check.outputs.new_version }}"

          # Generate changelog
          {
            echo "## 📝 Submodule Update: Ollama"
            echo ""
            echo "**Previous version:** \`$CURRENT_VERSION\` (\`$CURRENT_VERSION\`)"
            echo "**New version:** \`$TARGET_VERSION\`"
            echo ""
            echo "### 📋 Upstream Release Notes"
            echo ""
            echo "See the full release notes at: https://github.com/${{ env.OLLAMA_REPO }}/releases/tag/$TARGET_VERSION"
            echo ""
            echo "### Recent Commits:"
            echo ""
            git log --pretty=format:"- %s (%h) - %an" "$CURRENT_COMMIT..$TARGET_COMMIT" | head -30
          } > /tmp/changelog.md

          cat /tmp/changelog.md
      
      - name: Create Pull Request
        id: cpr
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update ollama submodule to ${{ steps.check.outputs.new_version }}
            
            Updates ollama submodule from ${{ steps.current.outputs.version }} to ${{ steps.check.outputs.new_version }}
          branch: auto/update-ollama-submodule
          delete-branch: true
          title: '🔄 Auto: Update Ollama submodule to ${{ steps.check.outputs.new_version }}'
          body-path: /tmp/changelog.md
          labels: |
            automated
            submodule-update
            dependencies
          assignees: ${{ github.repository_owner }}
      
      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate summary
        if: always()
        run: |
          {
            echo "## 🔄 Submodule Sync Summary"
            echo ""
            echo "**Submodule:** ${{ env.SUBMODULE_NAME }}"
            echo "**Current version:** \`${{ steps.current.outputs.version }}\`"
            echo "**Latest release:** \`${{ steps.fetch.outputs.version }}\`"
            echo ""
            if [ "${{ steps.check.outputs.has_changes }}" == "true" ]; then
              echo "**Status:** ✅ Version change detected — PR created for ${{ steps.check.outputs.new_version }}"
            else
              echo "**Status:** ℹ️ Already up-to-date with latest release (${{ steps.fetch.outputs.version }})"
            fi
          } >> $GITHUB_STEP_SUMMARY
